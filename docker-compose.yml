services:
  trust-agent-cloud:
    build:
      context: .
      dockerfile: trust-agent-cloud/Dockerfile
    container_name: trust-agent-cloud
    ports:
      - "3003:3003"
    environment:
      PORT: "3003"
      DB_PATH: "/data/trust-agent-cloud.db"
      KEYSTORE_PATH: "/data/trust-agent-cloud-keystore.json"
      KEYSTORE_KEK: "${TRUSTAGENT_KEYSTORE_KEK}"
    volumes:
      - trust-agent-cloud-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3003/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 40s

  bank-b-anchor:
    build:
      context: Bank-B/merkle-anchor
      dockerfile: Dockerfile
    container_name: bank-b-anchor
    ports:
      - "5001:5001"
    environment:
      RPC_URL: "${RPC_URL}"
      PRIVATE_KEY: "${PRIVATE_KEY}"
      DB_PATH: "/data/bank-b.db"
      # Delta #4: chain HEAD checkpoints + on-chain heartbeat. The heartbeat
      # publisher is opt-in (it continuously spends burner-wallet gas); the
      # /checkpoint and /heartbeat endpoints work regardless.
      CHECKPOINT_PARTY: "bank-b"
      HEARTBEAT_ENABLED: "${HEARTBEAT_ENABLED:-false}"
      HEARTBEAT_INTERVAL_SECONDS: "${HEARTBEAT_INTERVAL_SECONDS:-60}"
      PYTHONUNBUFFERED: "1"
    volumes:
      - bank-b-data:/data

  bank-b-proxy:
    build:
      context: .
      dockerfile: Bank-B/proxy/Dockerfile
    container_name: bank-b-proxy
    ports:
      - "3002:3002"
    environment:
      PORT: "3002"
      DB_PATH: "/data/bank-b.db"
      ANCHOR_URL: "http://bank-b-anchor:5001"
      TRUSTAGENT_URL: "http://trust-agent-cloud:3003"
      KEYSTORE_PATH: "/data/bank-b-keystore.json"
      KEYSTORE_KEK: "${BANK_B_KEYSTORE_KEK}"
    volumes:
      - bank-b-data:/data
    depends_on:
      trust-agent-cloud:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3002/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 40s

  bank-a-proxy:
    build:
      context: .
      dockerfile: Bank-A/proxy/Dockerfile
    container_name: bank-a-proxy
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      PROXY_B_URL: "http://bank-b-proxy:3002"
      TRUSTAGENT_URL: "http://trust-agent-cloud:3003"
      DB_PATH: "/data/bank-a.db"
      KEYSTORE_PATH: "/data/bank-a-keystore.json"
      KEYSTORE_KEK: "${BANK_A_KEYSTORE_KEK}"
      # Delta #5: WORM content store — per-holder envelope-encryption KEKs.
      # All four must be set for Bank-A to actually store/cross-push content;
      # if any is missing the proxy logs a warning and skips WORM storage
      # (existing envelope/hash-chain/witness behavior is unaffected).
      BANK_A_CONTENT_KEK: "${BANK_A_CONTENT_KEK}"
      CLIENT_CONTENT_KEK: "${CLIENT_CONTENT_KEK}"
      TRUSTAGENT_CONTENT_KEK: "${TRUSTAGENT_CONTENT_KEK}"
      REGULATOR_ESCROW_KEK: "${REGULATOR_ESCROW_KEK}"
      # Delta #7: degraded-mode fallback, disabled unless explicitly enabled.
      DEGRADED_MODE_ENABLED: "${DEGRADED_MODE_ENABLED:-false}"
      DEGRADED_MAX_VALUE_USD: "${DEGRADED_MAX_VALUE_USD:-1000}"
      DEGRADED_MAX_PER_WINDOW: "${DEGRADED_MAX_PER_WINDOW:-3}"
      DEGRADED_WINDOW_SECONDS: "${DEGRADED_WINDOW_SECONDS:-3600}"
      DEGRADED_RECONCILIATION_SECONDS: "${DEGRADED_RECONCILIATION_SECONDS:-900}"
    volumes:
      - bank-a-data:/data
    depends_on:
      bank-b-proxy:
        condition: service_healthy
      trust-agent-cloud:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 40s

  bank-a-agent:
    build:
      context: Bank-A/agent
      dockerfile: Dockerfile
    container_name: bank-a-agent
    ports:
      - "4001:4001"
    environment:
      PROXY_A_URL: "http://bank-a-proxy:3001"
      PROXY_B_URL: "http://bank-b-proxy:3002"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      AGENT_MODEL_ID: "${AGENT_MODEL_ID:-ollama/qwen3.5:9b}"
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-http://host.docker.internal:11434}"
      PYTHONUNBUFFERED: "1"
      AGENT_PORT: "4001"
    command: python strands_agent.py
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      bank-a-proxy:
        condition: service_healthy

  bank-b-agent:
    build:
      context: Bank-B/agent
      dockerfile: Dockerfile
    container_name: bank-b-agent
    ports:
      - "4002:4002"
    environment:
      PROXY_B_URL: "http://bank-b-proxy:3002"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      AGENT_MODEL_ID: "${AGENT_MODEL_ID:-ollama/qwen3.5:9b}"
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-http://host.docker.internal:11434}"
      AGENT_PORT: "4002"
      PYTHONUNBUFFERED: "1"
    command: python decision_agent.py
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      bank-b-proxy:
        condition: service_healthy

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - bank-a-proxy
      - bank-b-proxy

volumes:
  bank-a-data:
  bank-b-data:
  trust-agent-cloud-data:
